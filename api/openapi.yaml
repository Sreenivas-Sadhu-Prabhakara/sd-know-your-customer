# API contract — owned by THIS repo (contract-per-repo). Phase 2b-c: real domain.
openapi: 3.0.3
info:
  title: "Know Your Customer — BIAN Semantic API"
  description: >
    BIAN Service Domain 'Know Your Customer' (Process) on the 'KYC Assessment
    Procedure' control record. Screening pipeline: watchlist → REJECTED;
    missing documents / high-risk jurisdiction → REFERRED (analyst decides);
    otherwise APPROVED. Verdicts are published and, when a callbackUrl is
    given, delivered to the requesting account SD's kyc-result endpoint.
  version: 0.2.0
servers:
  - url: /
  - url: /sd-know-your-customer
    description: through the platform gateway

paths:
  /v1/service-domain:
    get:
      operationId: getServiceDomain
      summary: Service domain metadata
      responses:
        "200": { description: SD identity and BIAN classification }

  /v1/kyc-assessment-procedure/initiate:
    post:
      operationId: runAssessment
      summary: "Initiate — run a KYC assessment (synchronous screening)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerReference]
              properties:
                customerReference: { type: string }
                accountRef: { type: string, description: account whose opening triggered the check }
                countryCode: { type: string, pattern: "^[A-Za-z]{2}$" }
                documents:
                  type: array
                  items: { type: string }
                  description: provided document types (e.g. ID, ADDRESS)
                callbackUrl:
                  type: string
                  description: >
                    Optional. Full URL of the requester's kyc-result endpoint;
                    the verdict is PUT there as {"approved": bool, "reason": "…"}.
      responses:
        "201":
          description: Assessment with outcome (APPROVED | REJECTED | REFERRED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KycAssessment" }
        "400": { $ref: "#/components/responses/Invalid" }

  /v1/kyc-assessment-procedure:
    get:
      operationId: listAssessments
      summary: Retrieve (collection)
      responses:
        "200":
          description: All assessments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/KycAssessment" }

  /v1/kyc-assessment-procedure/{assessmentId}/retrieve:
    get:
      operationId: retrieveAssessment
      summary: Retrieve
      parameters: [{ $ref: "#/components/parameters/AssessmentId" }]
      responses:
        "200":
          description: The assessment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KycAssessment" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/kyc-assessment-procedure/{assessmentId}/control:
    put:
      operationId: decideReferredCase
      summary: "Control — analyst decision on a REFERRED case (reason mandatory; audit)"
      parameters: [{ $ref: "#/components/parameters/AssessmentId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, reason]
              properties:
                action: { type: string, enum: [approve, reject] }
                reason: { type: string }
      responses:
        "200": { description: Decided assessment (manuallyDecided=true) }
        "400": { $ref: "#/components/responses/Invalid" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

  /v1/kyc-assessment-procedure/watchlist:
    get:
      operationId: getWatchlist
      summary: Current watchlist
      responses:
        "200":
          description: Watchlisted customer references
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
    post:
      operationId: addToWatchlist
      summary: Add a customer reference to the watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerReference]
              properties:
                customerReference: { type: string }
      responses:
        "201": { description: Added }
        "400": { $ref: "#/components/responses/Invalid" }

components:
  parameters:
    AssessmentId:
      name: assessmentId
      in: path
      required: true
      schema: { type: string }

  responses:
    NotFound:
      description: Unknown assessment
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RuleViolation:
      description: Manual decision on a non-REFERRED case
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Invalid:
      description: Bad input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    KycAssessment:
      type: object
      properties:
        assessmentId: { type: string, example: "KYC-…" }
        customerReference: { type: string }
        accountRef: { type: string, nullable: true }
        countryCode: { type: string, nullable: true }
        documents:
          type: array
          items: { type: string }
        status: { type: string, enum: [APPROVED, REJECTED, REFERRED] }
        reasons:
          type: array
          items: { type: string }
          description: "e.g. CLEAN, WATCHLIST_HIT, MISSING_DOCUMENT:ADDRESS, HIGH_RISK_COUNTRY:KP, ANALYST:…"
        manuallyDecided: { type: boolean }
        callbackUrl: { type: string, nullable: true }
        assessedAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time, nullable: true }

    Error:
      type: object
      properties:
        code: { type: string, example: NOT_REFERRED }
        message: { type: string }
