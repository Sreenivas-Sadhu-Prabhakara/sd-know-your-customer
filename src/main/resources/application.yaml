spring:
  application:
    name: sd-know-your-customer

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Know Your Customer"
    businessArea: "Risk and Compliance"
    businessDomain: "Financial Crime"
    functionalPattern: "Process"
    assetType: "KYC Assessment"
    controlRecord: "KYC Assessment Procedure"
    phase: "2b-deep"

bian:
  kyc:
    # Documents every assessment must include; missing → REFERRED.
    required-documents: ID,ADDRESS
    # Jurisdictions requiring enhanced due diligence; hit → REFERRED.
    high-risk-countries: KP,IR
    # Seed sanctions/PEP watchlist (comma-separated customer refs); hit → REJECTED.
    # Runtime additions: POST /v1/kyc-assessment-procedure/watchlist
    watchlist: ""

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profile 'kafka': real event transport (gate 2). Without it, events log.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${BIAN_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
